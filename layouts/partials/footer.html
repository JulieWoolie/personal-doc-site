
{{partial "palmblock.html" . }}
<div class="bg-dark content-sizing content footer">
  <div class="footer-flex">
    {{if (eq .Kind "page")}}
      <button class="button" id="latex-convert-btn">Copy content as LaTeX</button>
    {{end}}
  </div>

  <table class="footer-metadata">
    <tbody>
    <tr>
      <td>Author</td>
      <td>{{default "None" .Params.Author}}</td>
    </tr>
    <tr>
      <td>Publish Date</td>
      <td>{{default "Unknown" .Params.publish_date}}</td>
    </tr>
    <tr>
      <td>Last Change</td>
      <td>{{.Lastmod}}</td>
    </tr>
    <tr>
      <td>Last Commit</td>
      <td>{{.GitInfo.Subject}}</td>
    </tr>
    </tbody>
  </table>
</div>
